# Only use spaces to indent your .yml configuration
name: Pylint-Test

on: [push]

jobs:
  pylint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies (pip, pylint & any third-party modules)
      run: |
        python -m pip install --upgrade pip
        pip install pylint==3.3.8 numpy==2.3.2
    - name: Analysing the code with pylint (disabled messages found in .pylintrc)
      run: |
        pylint $(git ls-files '*.py') potfile_gen aimpot2cube
    - name: Run test suite
      run: |
        cd ./test_suite
        bash ./run_tests.sh
        bash ./run_cleanup.sh
        cd ../
