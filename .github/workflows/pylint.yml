name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies (pip, pylint & any third-party modules)
      run: |
        python -m pip install --upgrade pip
        pip install pylint numpy
    - name: Analysing the code with pylint (disabled messages found in .pylintrc, import-error disabled due to issue with symlinks in github workflow)
      run: |
        pylint potfile_gen aimpot2cube common_io.py
